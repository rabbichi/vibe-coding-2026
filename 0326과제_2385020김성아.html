<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이름 추첨 프로그램 - 김성아</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #FFF0F3; 
            --container-bg: rgba(255, 255, 255, 0.95);
            --text-color: #2D3436; 
            --accent-color: #FF748D; 
            --secondary-color: #FFEBF0; 
            --border-color: #FFE0E9;
            --draw-text-color: #D6336C; 
            --card-shadow: 0 10px 40px rgba(255, 116, 141, 0.2);
            --input-bg: #FFFFFF;
            --grad-1: rgba(255, 116, 141, 0.1);
            --grad-2: rgba(255, 255, 255, 0.8);
            --transition-speed: 0.3s;
        }

        body.dark-mode {
            --bg-color: #1A0B10; 
            --container-bg: rgba(45, 20, 28, 0.95); 
            --text-color: #FFE0E9;
            --accent-color: #FF8DA1;
            --secondary-color: #451D29;
            --border-color: #5C2B39;
            --draw-text-color: #FFD3E0;
            --card-shadow: 0 10px 50px rgba(0, 0, 0, 0.8);
            --input-bg: #3D1C26;
            --grad-1: rgba(255, 141, 161, 0.05);
            --grad-2: rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            color: var(--text-color);
            transition: background var(--transition-speed) ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            min-height: 100vh;
            background: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, var(--grad-1) 0%, transparent 30%), 
                radial-gradient(circle at 90% 80%, var(--grad-2) 0%, transparent 25%),
                linear-gradient(135deg, var(--bg-color) 0%, var(--secondary-color) 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        .app-container {
            width: 95%; max-width: 1100px;
            background: var(--container-bg);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            box-shadow: var(--card-shadow);
            padding: 40px;
            display: grid;
            grid-template-areas: "header header" "input result";
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
            border: 1px solid var(--border-color);
            z-index: 10;
        }

        .header-panel { grid-area: header; display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 3px solid var(--border-color); }
        h1 { font-size: 1.8em; margin: 0; color: var(--accent-color); font-weight: 800; }
        
        .header-controls { display: flex; gap: 8px; }
        select, .search-input { background-color: var(--input-bg); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 8px; padding: 6px 12px; outline: none; }

        .input-panel { grid-area: input; display: flex; flex-direction: column; gap: 15px; padding-right: 20px; border-right: 3px solid var(--border-color); }
        .section-label { font-weight: 800; color: var(--accent-color); font-size: 0.95em; }

        textarea { width: 100%; height: 180px; padding: 15px; border-radius: 15px; border: 2px solid var(--border-color); background: var(--input-bg); color: var(--text-color); font-size: 1em; resize: none; box-sizing: border-box; }

        .draw-controls { display: flex; flex-direction: column; gap: 12px; background: var(--secondary-color); padding: 15px; border-radius: 15px; }
        input[type="number"] { background: var(--input-bg); color: var(--draw-text-color); border: 2px solid var(--border-color); border-radius: 8px; padding: 5px; width: 50px; text-align: center; font-weight: 800; }

        .result-panel { grid-area: result; display: flex; flex-direction: column; gap: 20px; }
        #display-name { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 2.8em; font-weight: 900; color: var(--draw-text-color); background: var(--input-bg); border-radius: 18px; text-align: center; border: 2px solid var(--border-color); padding: 10px; }

        .list-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .list-box { background: var(--input-bg); border-radius: 14px; padding: 15px; height: 300px; overflow-y: auto; border: 1px solid var(--border-color); }
        .list-box h3 { color: var(--accent-color); border-bottom: 2px solid var(--border-color); padding-bottom: 8px; margin: 0 0 10px 0; font-weight: 800; font-size: 0.85em; display: flex; justify-content: space-between; align-items: center; }

        button { padding: 10px 16px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.9em; }
        .btn-main { background: var(--accent-color); color: white; width: 100%; }
        .btn-util { background: var(--secondary-color); color: var(--text-color); }
        .btn-copy { font-size: 0.7em; padding: 4px 8px; background: var(--accent-color); color: white; border-radius: 5px; }

        .name-tag { display: flex; justify-content: space-between; align-items: center; background: var(--bg-color); padding: 7px 10px; margin-bottom: 6px; border-radius: 8px; font-size: 0.85em; animation: fadeIn 0.3s ease; }
        .btn-move { padding: 3px 8px; font-size: 0.7em; background: var(--accent-color); color: white; border-radius: 5px; border: none; cursor: pointer; }

        footer { margin-top: 25px; font-weight: 800; color: var(--accent-color); font-size: 1.1em; }
        .sakura-leaf { position: fixed; top: -20px; z-index: 9999; animation: fall-rotate linear forwards; pointer-events: none; }
        @keyframes fall-rotate { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(105vh) rotate(720deg); opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) {
            .app-container { grid-template-areas: "header" "input" "result"; grid-template-columns: 1fr; }
            .input-panel { border-right: none; padding-right: 0; border-bottom: 3px solid var(--border-color); padding-bottom: 15px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-panel">
        <h1 id="title">이름 추첨 프로그램</h1>
        <div class="header-controls">
            <select id="lang-select" onchange="changeLang()">
                <option value="ko">한국어</option>
                <option value="en">English</option>
                <option value="cn">中文</option>
                <option value="de">Deutsch</option>
            </select>
            <button class="btn-util" id="btn-dark" onclick="toggleDarkMode()">다크 모드</button>
            <button class="btn-util" id="btn-save" onclick="saveAsImage()">이미지 저장</button>
        </div>
    </div>

    <div class="input-panel">
        <div class="section-label" id="label-input">1. 명단 입력 (Excel 워크시트 복사 가능)</div>
        <textarea id="input-names" placeholder="추첨할 명단을 입력하세요..."></textarea>
        <div class="draw-controls">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span id="label-count" style="font-weight: 800; font-size: 0.85em;">추첨 인원 (1명 이상 선택)</span>
                <input type="number" id="draw-count" value="1" min="1">
            </div>
            <button class="btn-main" id="btn-draw" onclick="startDraw()">추첨 시작</button>
        </div>
        <button class="btn-util" id="btn-reset" onclick="resetAll()" style="width: 100%;">초기화 (모두 삭제)</button>
    </div>

    <div class="result-panel">
        <div id="display-name">준비 완료!</div>
        <div class="list-grid">
            <div class="list-box">
                <h3>
                    <span id="label-candidates">추첨 대상 (Pool)</span>
                    <div style="position:relative; display:flex; align-items:center;">
                        <input type="text" id="search-pool" class="search-input" style="width: 70px; font-size: 0.8em; padding-right:25px;" oninput="updateList()">
                        <span style="position:absolute; right:7px; font-size:0.85em; pointer-events:none; color:var(--accent-color);">🔍</span>
                    </div>
                </h3>
                <div id="candidate-list"></div>
            </div>
            <div class="list-box">
                <h3>
                    <span id="label-winners">당첨자 목록 (관리)</span>
                    <button class="btn-copy" id="btn-copy" onclick="copyWinners()">복사</button>
                </h3>
                <div id="winner-list"></div>
            </div>
        </div>
    </div>
</div>

<footer>김성아(경영23)</footer>

<div id="capture-template" style="display: none; width: 800px; padding: 40px; background-color: #FFF0F3; font-family: 'Pretendard'; border-radius: 20px;">
    <h2 id="cap-title" style="color: #FF748D; border-bottom: 2px solid #FFE0E9; padding-bottom: 15px;"></h2>
    <div id="cap-main" style="margin: 20px 0; padding: 30px; background: white; border-radius: 15px; font-size: 2.5em; text-align: center; color: #D6336C; font-weight: 900; border: 2px solid #FFE0E9;"></div>
    <div id="cap-list-title" style="font-weight: 800; color: #FF748D; margin-bottom: 10px;"></div>
    <div id="cap-list" style="background: white; padding: 20px; border-radius: 15px; border: 1px solid #FFE0E9; font-size: 1.2em;"></div>
</div>

<script>
    let winners = [];
    let isDrawing = false;
    const autoSaveKey = 'seonga_final_assignment';

    const i18n = {
        ko: { title: "이름 추첨 프로그램", input: "1. 명단 입력 (Excel 워크시트 복사 가능)", count: "추첨 인원 (1명 이상 선택)", draw: "추첨 시작", reset: "초기화 (모두 삭제)", candidates: "추첨 대상 (Pool)", winners: "당첨자 목록 (관리)", ready: "준비 완료!", save: "이미지 저장", dark: "다크 모드", placeholder: "추첨할 명단을 입력하세요...", confirmReset: "모든 데이터를 초기화할까요?", alertShort: "인원이 부족합니다!", move: "추첨 대상으로 이동", copy: "복사", copyMsg: "명단이 복사되었습니다!", capTitle: "추첨 결과 - 김성아(경영23)", fileName: "당첨결과.png", capWinner: "최종 당첨 리스트" },
        en: { title: "Name Picker", input: "1. Input List (Excel Copy OK)", count: "Count (Select 1 or more)", draw: "Start Draw", reset: "Reset All", candidates: "Candidate Pool", winners: "Winner Management", ready: "Ready!", save: "Save Image", dark: "Dark Mode", placeholder: "Enter names...", confirmReset: "Reset all data?", alertShort: "Not enough candidates!", move: "Move to Pool", copy: "Copy", copyMsg: "List copied!", capTitle: "Draw Result - Seong-a Kim", fileName: "Result.png", capWinner: "Winner List" },
        cn: { title: "名字抽取器", input: "1. 输入名单", count: "人数", draw: "开始抽取", reset: "重置", candidates: "候选池", winners: "中奖名单", ready: "准备好了!", save: "保存图片", dark: "夜间模式", placeholder: "输入名字...", confirmReset: "全部重置吗？", alertShort: "人数不足！", move: "移至候选", copy: "复制", copyMsg: "已复制！", capTitle: "抽取结果 - 金成娥", fileName: "结果.png", capWinner: "中奖名单" },
        de: { title: "Namen-Zieher", input: "1. Liste eingeben", count: "Anzahl", draw: "Ziehung Start", reset: "Zurücksetzen", candidates: "Kandidaten-Pool", winners: "Gewinner-Liste", ready: "Bereit!", save: "Bild Speichern", dark: "Dunkelmodus", placeholder: "Namen eingeben...", confirmReset: "Zurücksetzen?", alertShort: "Zu wenig Kandidaten!", move: "In Pool verschieben", copy: "Kopieren", copyMsg: "Kopiert!", capTitle: "Ziehungsergebnis - Seong-a Kim", fileName: "Ergebnis.png", capWinner: "Gewinner-Liste" }
    };

    window.onload = () => {
        const saved = localStorage.getItem(autoSaveKey);
        if (saved) document.getElementById('input-names').value = saved;
        document.getElementById('input-names').addEventListener('input', (e) => {
            localStorage.setItem(autoSaveKey, e.target.value);
            updateList();
        });
        updateList();
        changeLang();
    };

    function triggerSakuraEffect() {
        const petals = ['🌸', '💖', '🤍', '✨'];
        for (let i = 0; i < 35; i++) {
            setTimeout(() => {
                const leaf = document.createElement('div');
                leaf.classList.add('sakura-leaf');
                leaf.innerText = petals[Math.floor(Math.random() * petals.length)];
                leaf.style.left = Math.random() * 100 + "vw";
                leaf.style.fontSize = (Math.random() * 10 + 15) + "px";
                leaf.style.animationDuration = (Math.random() * 2 + 3) + "s";
                document.body.appendChild(leaf);
                setTimeout(() => leaf.remove(), 5000);
            }, i * 60);
        }
    }

    function startDraw() {
        if (isDrawing) return;
        const l = i18n[document.getElementById('lang-select').value];
        const text = document.getElementById('input-names').value;
        const candidates = text.split(/[\n,]+/).map(n => n.trim()).filter(n => n !== "" && !winners.includes(n));
        const count = parseInt(document.getElementById('draw-count').value);

        if (candidates.length < count) { alert(l.alertShort); return; }

        isDrawing = true;
        let elapsed = 0;
        const display = document.getElementById('display-name');
        const shuffle = setInterval(() => {
            display.innerText = candidates[Math.floor(Math.random() * candidates.length)];
            elapsed += 60;
            if (elapsed >= 1500) {
                clearInterval(shuffle);
                const selected = candidates.sort(() => 0.5 - Math.random()).slice(0, count);
                winners = [...selected, ...winners];
                display.innerText = selected.join(", ");
                isDrawing = false;
                updateList();
                triggerSakuraEffect();
            }
        }, 60);
    }

    function updateList() {
        const text = document.getElementById('input-names').value;
        const search = document.getElementById('search-pool').value.toLowerCase();
        const all = text.split(/[\n,]+/).map(n => n.trim()).filter(n => n !== "");
        const candDiv = document.getElementById('candidate-list');
        const winDiv = document.getElementById('winner-list');
        const l = i18n[document.getElementById('lang-select').value];

        candDiv.innerHTML = ""; winDiv.innerHTML = "";
        all.forEach(n => {
            if(!winners.includes(n) && n.toLowerCase().includes(search)) {
                candDiv.innerHTML += `<div class="name-tag"><span>${n}</span></div>`;
            }
        });
        winners.forEach(n => {
            winDiv.innerHTML += `<div class="name-tag"><span>${n}</span> <button class="btn-move" onclick="moveToPool('${n}')">${l.move}</button></div>`;
        });
    }

    function moveToPool(name) {
        winners = winners.filter(w => w !== name);
        updateList();
    }

    function copyWinners() {
        const l = i18n[document.getElementById('lang-select').value];
        if (winners.length === 0) return;
        navigator.clipboard.writeText(winners.join(", ")).then(() => alert(l.copyMsg));
    }

    function resetAll() {
        const l = i18n[document.getElementById('lang-select').value];
        if(confirm(l.confirmReset)) {
            winners = []; document.getElementById('input-names').value = "";
            localStorage.removeItem(autoSaveKey);
            updateList();
            document.getElementById('display-name').innerText = l.ready;
        }
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }

    function changeLang() {
        const l = i18n[document.getElementById('lang-select').value];
        document.getElementById('title').innerText = l.title;
        document.getElementById('label-input').innerText = l.input;
        document.getElementById('label-count').innerText = l.count;
        document.getElementById('btn-draw').innerText = l.draw;
        document.getElementById('btn-reset').innerText = l.reset;
        document.getElementById('label-candidates').innerText = l.candidates;
        document.getElementById('label-winners').innerText = l.winners;
        document.getElementById('btn-save').innerText = l.save;
        document.getElementById('btn-dark').innerText = l.dark;
        document.getElementById('btn-copy').innerText = l.copy;
        document.getElementById('input-names').placeholder = l.placeholder;
        updateList();
        if (!isDrawing && winners.length === 0) document.getElementById('display-name').innerText = l.ready;
    }

    function saveAsImage() {
        const l = i18n[document.getElementById('lang-select').value];
        const t = document.getElementById('capture-template');
        document.getElementById('cap-title').innerText = l.capTitle;
        document.getElementById('cap-main').innerText = document.getElementById('display-name').innerText;
        document.getElementById('cap-list-title').innerText = l.capWinner;
        document.getElementById('cap-list').innerText = winners.join(", ");
        t.style.display = "block";
        html2canvas(t).then(canvas => {
            const link = document.createElement('a');
            link.download = l.fileName;
            link.href = canvas.toDataURL();
            link.click();
            t.style.display = "none";
        });
    }
</script>
</body>
</html>
